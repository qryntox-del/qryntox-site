    <script>
        (function() {
            // Silence specific console logs
            const methods = ['log', 'warn', 'error'];
            methods.forEach(method => {
                const original = console[method];
                console[method] = function(...args) {
                    const msg = args.map(a => {
                        try { return typeof a === 'object' ? JSON.stringify(a) : String(a); } catch(e) { return String(a); }
                    }).join(' ');
                    if (msg.includes('MutationObserver') || msg.includes('Tailwind') || msg.includes('Too Many Requests') || msg.includes('429')) {
                        return;
                    }
                    original.apply(console, args);
                };
            });

            // Global fetch rate limiter (2 seconds delay) to prevent 429 Too Many Requests
            const originalFetch = window.fetch;
            let lastFetchTime = 0;
            window.fetch = async function(...args) {
                const now = Date.now();
                const timeSinceLastFetch = now - lastFetchTime;
                if (timeSinceLastFetch < 2000) {
                    await new Promise(resolve => setTimeout(resolve, 2000 - timeSinceLastFetch));
                }
                lastFetchTime = Date.now();
                return originalFetch.apply(this, args);
            };
        })();
    </script>
