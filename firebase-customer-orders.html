<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QRYNTOX | My Orders (Firebase)</title>
    <meta name="description" content="Customer orders dashboard powered by Firebase">
    
    <script src="https://resource.trickle.so/vendor_lib/unpkg/react@18/umd/react.production.min.js"></script>
    <script src="https://resource.trickle.so/vendor_lib/unpkg/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://resource.trickle.so/vendor_lib/unpkg/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://resource.trickle.so/vendor_lib/unpkg/lucide-static@0.516.0/font/lucide.css" rel="stylesheet">

    <!-- Firebase Compat Libraries for preview -->
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
    
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Montserrat', 'sans-serif'],
                    }
                }
            }
        }
    </script>
    <style type="text/tailwindcss">
    @layer base { 
        body { @apply bg-gray-50 text-gray-900 antialiased min-h-screen; } 
    }
    @layer components {
        .status-badge {
            @apply inline-flex items-center px-3 py-1 rounded-full text-xs font-bold uppercase tracking-wider border;
        }
        .status-processing {
            @apply bg-orange-50 text-orange-600 border-orange-200;
        }
        .status-shipped {
            @apply bg-blue-50 text-blue-600 border-blue-200;
        }
        .status-delivered {
            @apply bg-green-50 text-green-600 border-green-200;
        }
    }
    </style>
</head>
<body>
    <div id="root"></div>
    <script type="text/babel" src="utils/cartManager.js"></script>
    <script type="text/babel" src="utils/config.js"></script>
    <script type="text/babel" src="components/VaultModal.js"></script>
    <script type="text/babel" src="components/Header.js"></script>
    <script type="text/babel" src="components/CartDrawer.js"></script>
    <script type="text/babel" src="components/Footer.js"></script>
    <script type="text/babel" src="components/FirebaseCustomerOrders.js"></script>
    <script type="text/babel" src="firebase-customer-orders-app.js"></script>
</body>
</html>
