    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Montserrat', 'sans-serif'],
                        serif: ['"Cormorant Garamond"', 'serif'],
                    },
                    colors: {
                        primary: '#000000',
                        secondary: '#888888',
                        dark: {
                            900: '#ffffff',
                            800: '#f4f4f5',
                            700: '#e4e4e7',
                            600: '#d4d4d8',
                        }
                    },
                    animation: {
                        'fade-in': 'fadeIn 1s ease-out',
                        'slide-up': 'slideUp 0.8s ease-out forwards',
                        'heart-blast': 'heartBlast 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards',
                        'center-blast': 'centerBlast 0.8s ease-out forwards',
                    },
                    keyframes: {
                        fadeIn: {
                            '0%': { opacity: '0' },
                            '100%': { opacity: '1' },
                        },
                        slideUp: {
                            '0%': { opacity: '0', transform: 'translateY(30px)' },
                            '100%': { opacity: '1', transform: 'translateY(0)' },
                        },
                        heartBlast: {
                            '0%': { transform: 'scale(1)', opacity: '1' },
                            '15%': { transform: 'scale(2.2) rotate(-8deg)', opacity: '0.9' },
                            '30%': { transform: 'scale(2) rotate(8deg)', opacity: '1' },
                            '45%': { transform: 'scale(2.1) rotate(-4deg)', opacity: '1' },
                            '100%': { transform: 'scale(1) rotate(0deg)', opacity: '1' },
                        },
                        centerBlast: {
                            '0%': { transform: 'translate(-50%, -50%) scale(0)', opacity: '0.5' },
                            '30%': { transform: 'translate(-50%, -50%) scale(2.5)', opacity: '1' },
                            '60%': { transform: 'translate(-50%, -50%) scale(2.5)', opacity: '1' },
                            '100%': { transform: 'translate(-50%, -10%) scale(1.5)', opacity: '0' },
                        }
                    }
                }
            }
        }
    </script>

    <style type="text/tailwindcss">
    @layer base {
        html, body {
            overflow-x: hidden;
            max-width: 100vw;
        }
        body {
            @apply bg-gradient-to-r from-[#E0E0E0] to-[#FFFFFF] text-black antialiased min-h-screen;
        }
        ::-webkit-scrollbar {
            width: 8px;
        }
        ::-webkit-scrollbar-track {
            @apply bg-gray-100;
        }
        ::-webkit-scrollbar-thumb {
            @apply bg-gray-300 rounded-full hover:bg-gray-400 transition-colors;
        }
    }

    @layer components {
        .btn {
            @apply px-6 py-3 font-medium transition-all duration-300 flex items-center justify-center gap-2 min-h-[44px];
        }
        .btn-primary {
            @apply bg-white text-black uppercase tracking-widest shadow-md hover:shadow-lg hover:-translate-y-0.5 text-xs;
        }
        .btn-outline {
            @apply border border-gray-300 text-black hover:border-black uppercase tracking-widest text-xs;
        }
        .glass-panel {
            @apply bg-white/50 backdrop-blur-lg border border-white/60 shadow-sm;
        }
        .hover-lift {
            @apply transition-transform duration-300 hover:-translate-y-2;
        }

        .btn-gold {
            background-image: 
                linear-gradient(to bottom, rgba(255,255,255,0.4) 0%, rgba(255,255,255,0) 40%, rgba(0,0,0,0.05) 60%, rgba(0,0,0,0.2) 100%),
                linear-gradient(135deg, #fef44b 0%, #daa22f 100%);
            border: 1px solid #c7952a;
            border-radius: 5px;
            box-shadow: 
                inset 0 1px 1px rgba(255,255,255,0.6),
                inset 0 -1px 1px rgba(100,50,0,0.4),
                0 4px 6px -1px rgba(0, 0, 0, 0.3);
            color: #433010;
            text-transform: uppercase;
            font-weight: 700;
            position: relative;
            overflow: hidden;
            transition: all 0.2s ease;
            text-shadow: 0 1px 1px rgba(255, 255, 255, 0.4);
        }
        
        .btn-gold::before {
            content: '';
            position: absolute;
            top: 0;
            left: -150%;
            width: 100%;
            height: 100%;
            background: linear-gradient(to right, rgba(255,255,255,0) 0%, rgba(255,255,255,0.5) 50%, rgba(255,255,255,0) 100%);
            transform: skewX(-25deg);
            transition: none;
        }
        
        .btn-gold:hover {
            background-image: 
                linear-gradient(to bottom, rgba(255,255,255,0.5) 0%, rgba(255,255,255,0) 40%, rgba(0,0,0,0) 60%, rgba(0,0,0,0.1) 100%),
                linear-gradient(135deg, #fff875 0%, #e5b03f 100%);
            transform: scale(1.02);
            box-shadow: 
                inset 0 1px 2px rgba(255,255,255,0.8),
                inset 0 -1px 1px rgba(100,50,0,0.4),
                0 6px 12px -2px rgba(0, 0, 0, 0.4);
            border-color: #d1a53a;
        }
        
        .btn-gold:hover::before {
            animation: shimmer 1.5s infinite;
        }
    }
    
    @layer utilities {
        @keyframes shimmer {
            100% { left: 200%; }
        }
        .stagger-1 { animation-delay: 100ms; }
        .stagger-2 { animation-delay: 200ms; }
    }
    </style>
