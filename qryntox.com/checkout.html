                    colors: { primary: '#ffffff', secondary: '#a1a1aa', dark: { 900: '#09090b', 800: '#18181b', 700: '#27272a', 600: '#3f3f46' } },

                        pop: {

    <style type="text/tailwindcss">
    @layer base { body { @apply bg-white text-[#111111] antialiased min-h-screen; overflow-x: hidden; } }
    @layer components {
        .btn-gold {
            background-image: 
                linear-gradient(to bottom, rgba(255,255,255,0.4) 0%, rgba(255,255,255,0) 40%, rgba(0,0,0,0.05) 60%, rgba(0,0,0,0.2) 100%),

            overflow: hidden;
            transition: all 0.2s ease;

            transition: none;
        }
        
        .btn-gold:hover {

            border-color: #d1a53a;
        }
        
        .btn-gold:hover::before {
            animation: shimmer 1.5s infinite;
        }
    }
    @layer utilities {
        @keyframes shimmer {
            100% { left: 200%; }
        }
    }
